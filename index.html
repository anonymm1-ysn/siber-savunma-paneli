<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Foxzy AI Simulation v6.0 - Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="simulation-space">
        <!-- Yükleme Ekranı -->
        <div id="boot-loader">
            <div class="matrix-text">FOXZY_CORE_v6.0_INITIALIZING...</div>
            <div class="progress-bar"><div class="fill"></div></div>
        </div>

        <!-- Tilki Konteynırı -->
        <div id="fox-actor" class="state-idle">
            <div id="thought-cloud"></div>
            <div class="fox-visuals">
                <img id="fox-sprite" src="fox_idle.gif" alt="Foxzy">
            </div>
            <!-- Etkileşim Halkası -->
            <div class="interaction-ring"></div>
        </div>

        <!-- Dinamik Objeler (Yemek Kapları vb.) -->
        <div id="food-bowl" style="display:none;">🍖</div>
    </div>

    <!-- HUD (Heads-Up Display) - Oyun Paneli -->
    <div id="hud">
        <div class="status-bars">
            <div class="bar-container"><span>HUNGER</span><div class="bar"><div id="h-fill" style="width:100%"></div></div></div>
            <div class="bar-container"><span>ENERGY</span><div class="bar"><div id="e-fill" style="width:100%"></div></div></div>
        </div>
        <div class="pro-actions">
            <button onclick="petManager.spawnFood()">FEED (F)</button>
            <button onclick="petManager.playWithFox()">PLAY (P)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
