<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE MACHINE v5.0 - Ahmet DEV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div id="terminal-win" class="window" style="width: 600px; top: 50px; left: 50px;">
            <div class="window-header" onmousedown="dragElement(this)">
                <span>💻 Secure Terminal (Py/Java Support)</span>
                <button onclick="closeWindow('terminal-win')">●</button>
            </div>
            <div id="log-box" class="window-body terminal-body">
                <div style="color: #0f0;">[SYSTEM READY] Komut bekliyor... ('help' yazın)</div>
            </div>
            <div class="terminal-input-line">
                <span>admin@secure:~$</span>
                <input type="text" id="cmd-input" autofocus autocomplete="off">
            </div>
        </div>

        <div id="leaderboard-win" class="window" style="display:none; width: 320px; top: 100px; right: 50px;">
            <div class="window-header" onmousedown="dragElement(this)">
                <span>🏆 Global Rankings</span>
                <button onclick="closeWindow('leaderboard-win')">●</button>
            </div>
            <div class="window-body">
                <ul id="leader-list" style="list-style: none; padding: 0; margin: 0;"></ul>
                <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
                <div style="text-align:center; color:#0f0; font-family: monospace;">
                    <div>Sistemde Kalma: <span id="session-timer">00:00</span></div>
                    <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">Puan: <span id="user-points">0</span></div>
                </div>
            </div>
        </div>

        <div id="taskbar">
            <div class="start-btn" onclick="openWindow('leaderboard-win')">🏆 LİDERLİK TABLOSU</div>
            <div class="task-items">
                <span class="task-node">📡 Bağlantı: AKTİF</span>
                <span class="task-node">🛡️ Firewall: YÜKSEK</span>
                <span class="task-node">🐍 Python/Java: HAZIR</span>
            </div>
            <div id="live-clock">00:00:00</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
