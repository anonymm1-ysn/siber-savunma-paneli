<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Foxzy AI - Hardcoded Version</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: sans-serif; color: white; }
        #stage { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle, #1e293b, #020617); }
        
        /* Tilki Karakteri */
        #fox {
            position: absolute; width: 100px; height: 100px;
            cursor: grab; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s;
        }

        /* Piksel Art Tilki (Base64 ile Gömülü - Asla Kırılmaz) */
        .fox-img {
            width: 80px; height: 80px;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHBhdGggZD0iTTQ4IDhoLTh2OGgtOHY4aC04di04SDhWOGgtOHY0MGg4djhoOHY4aDE2djhoOHYtOGg4di04aDhWMTJoLTZ6IiBmaWxsPSIjZTY3ZTIyIi8+PHBhdGggZD0iTTE2IDI0aDhaTTE2IDMyaDh6TTQwIDI0aDh6TTQwIDMyYDh6IiBmaWxsPSIjZmZmIi8+PHBhdGggZD0iTTE2IDMyaDh6TTQwIDMyYDh6IiBmaWxsPSIjMDAwIi8+PC9zdmc+");
            background-size: contain; background-repeat: no-repeat;
        }

        #bubble {
            background: white; color: black; padding: 5px 10px; border-radius: 10px;
            font-size: 12px; font-weight: bold; margin-bottom: 5px; opacity: 0; transition: 0.3s;
        }

        #hud {
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 1px solid #e67e22;
        }
        .bar-bg { width: 100px; height: 8px; background: #333; border-radius: 4px; margin: 5px 0; }
        .bar-fill { height: 100%; background: #e67e22; width: 100%; transition: 0.3s; }
        button { background: #e67e22; border: none; color: white; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="stage">
    <div id="fox">
        <div id="bubble">Selam Ahmet!</div>
        <div class="fox-img"></div>
    </div>
</div>

<div id="hud">
    <div>ENERJİ <div class="bar-bg"><div id="e-bar" class="bar-fill"></div></div></div>
    <div style="margin-top:10px">AÇLIK <div class="bar-bg"><div id="h-bar" class="bar-fill"></div></div></div>
    <button onclick="feed()">YEMEK VER</button>
</div>

<script>
    const fox = document.getElementById('fox');
    const bubble = document.getElementById('bubble');
    let energy = 100, hunger = 100;
    let x = window.innerWidth / 2, y = window.innerHeight / 2;
    let targetX = x, targetY = y;
    let dragging = false;

    // Hareket Sistemi
    function loop() {
        if (!dragging) {
            x += (targetX - x) * 0.05;
            y += (targetY - y) * 0.05;
            fox.style.left = x + 'px';
            fox.style.top = y + 'px';
            
            if(Math.abs(targetX - x) > 1) {
                fox.style.transform = `scaleX(${targetX > x ? 1 : -1})`;
            }
        }
        requestAnimationFrame(loop);
    }
    loop();

    // Yapay Zeka
    setInterval(() => {
        if (dragging) return;
        targetX = Math.random() * (window.innerWidth - 100);
        targetY = Math.random() * (window.innerHeight - 100);
        
        energy -= 5; hunger -= 10;
        if(energy < 20) say("Çok yorgunum...");
        updateHUD();
    }, 3000);

    function say(t) {
        bubble.innerText = t;
        bubble.style.opacity = 1;
        setTimeout(() => bubble.style.opacity = 0, 2000);
    }

    function updateHUD() {
        document.getElementById('e-bar').style.width = energy + "%";
        document.getElementById('h-bar').style.width = hunger + "%";
    }

    function feed() {
        energy = 100; hunger = 100;
        say("Harika! 🍖");
        updateHUD();
    }

    // Sürükleme
    fox.onmousedown = (e) => {
        dragging = true;
        say("Beni bırak! :D");
        document.onmousemove = (ev) => {
            x = ev.clientX - 50; y = ev.clientY - 50;
            fox.style.left = x + 'px'; fox.style.top = y + 'px';
        };
        document.onmouseup = () => {
            dragging = false;
            targetX = x; targetY = y;
            document.onmousemove = null;
        };
    };
</script>
</body>
</html>
