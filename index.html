<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIMEDES AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="status-dot"></div>
            <h1>ARCHIMEDES</h1>
        </header>

        <div id="chat-box">
            <div class="msg bot">Merhaba kanka! Ben ARCHIMEDES. Bugün sana nasıl yardımcı olabilirim? ✨</div>
        </div>
        
        <div class="input-wrapper">
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Bir şeyler sor..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
