<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kuş Birleştirme - Beta 0.1.7 (Otomatik PNG)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        /* CANVA ARKA PLANIN */
        #game-canvas {
            width: 100vw;
            height: 100vh;
            /* Bu dosyanın Downloads klasöründe olması şart */
            background: url('file:///c:/Users/Administrator/Downloads/Adsız tasarım.png') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* UI PANELLERİ */
        .ui { position: absolute; color: #3e2723; font-weight: bold; padding: 12px; background: rgba(255,255,255,0.7); border-radius: 15px; margin: 15px; z-index: 100; border: 2px solid #5d4037; pointer-events: none; }
        #gold-ui { top: 0; left: 0; font-size: 26px; color: #b8860b; }
        #timer-ui { top: 0; right: 0; font-size: 18px; }

        /* YUVALAR */
        .nest {
            width: 90px;
            height: 70px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        /* KUŞLAR VE ŞEFFAFLIK */
        .bird {
            width: 70px;
            height: 70px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: grab;
            margin-top: -40px;
            /* Artık multiply komutuna gerek yok çünkü internetten şeffaf PNG'ler bulduk */
        }
        .bird:active { cursor: grabbing; transform: scale(1.1); }

        /* ZİYARETÇİ */
        #visitor {
            position: absolute;
            top: -100px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: all 2.5s ease-in-out;
            z-index: 80;
        }

        #buy-nest-btn {
            bottom: 30px;
            right: 30px;
            padding: 15px 35px;
            background: #8bc34a;
            color: white;
            border: 3px solid #558b2f;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            position: absolute;
            z-index: 100;
            box-shadow: 0 4px 0 #33691e;
        }
        #buy-nest-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="gold-ui" class="ui">Altın: <span id="gold">120</span> 💰</div>
    <div id="timer-ui" class="ui">Ziyaretçi: <span id="timer">04:00</span> 🦅</div>
    
    <div id="visitor"></div>
    <div id="nests-wrapper"></div>

    <button id="buy-nest-btn">Yeni Yuva Al (100 Altın)</button>
</div>

<script>
    // İNTERNETTEN HAZIR VE ŞEFFAFF PNG LİNKLERİ
    const URL_AYARLARI = {
        yuva: "https://i.imgur.com/KxJ6w5N.png", // Basit, şeffaf yuva
        ziyaretci: "https://i.imgur.com/A6uC2xY.png", // Kartal/Büyük kuş
        kuslar: {
            1: "https://i.imgur.com/Q2rR3hS.png", // Muhabbet (Yeşil)
            2: "https://i.imgur.com/K7R6YpZ.png", // Sultan (Gri)
            3: "https://i.imgur.com/J3T6G2q.png", // Cennet (Kırmızı/Yeşil)
            4: "https://i.imgur.com/H1t3L1E.png", // Kanarya (Sarı)
            5: "https://i.imgur.com/F3b5M7s.png", // Tukan
            6: "https://i.imgur.com/W1X4C1v.png"  // Papağan (Mavi)
        }
    };

    // Canva tasarımındaki dallarına göre koordinatlar
    const dalKoordinatlari = [
        { x: 42, y: 46 }, // Alt dal
        { x: 36, y: 34 }, // Sol dal
        { x: 55, y: 38 }, // Sağ dal
        { x: 61, y: 26 }, // Üst sağ dal
        { x: 44, y: 22 }, // En üst dal
        { x: 50, y: 55 }  // Alt orta
    ];

    let gold = 120;
    let timerSeconds = 240;
    let aktifYuvalar = [{ index: 0, birdLevel: 1 }, { index: 1, birdLevel: 0 }];

    function init() {
        render();
        // Saniyede 1 Altın
        setInterval(() => {
            gold += 1;
            document.getElementById('gold').innerText = gold;
            timerSeconds--;
            if (timerSeconds <= 0) { visitorArrival(); timerSeconds = 240; }
            updateTimer();
        }, 1000);
        document.getElementById('buy-nest-btn').onclick = buyNest;
    }

    function render() {
        const wrapper = document.getElementById('nests-wrapper');
        wrapper.innerHTML = '';
        aktifYuvalar.forEach((yuva, arrIdx) => {
            const koord = dalKoordinatlari[yuva.index];
            const nestDiv = document.createElement('div');
            nestDiv.className = 'nest';
            nestDiv.style.left = koord.x + '%';
            nestDiv.style.top = koord.y + '%';
            // İnternet yuva linki
            nestDiv.style.backgroundImage = `url('${URL_AYARLARI.yuva}')`;

            if (yuva.birdLevel > 0) {
                const birdDiv = document.createElement('div');
                birdDiv.className = 'bird';
                // İnternet kuş linki
                birdDiv.style.backgroundImage = `url('${URL_AYARLARI.kuslar[yuva.birdLevel]}')`;
                birdDiv.draggable = true;
                birdDiv.ondragstart = (e) => e.dataTransfer.setData("text", arrIdx);
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIdx = e.dataTransfer.getData("text");
                    handleMerge(parseInt(fromIdx), arrIdx);
                };
                nestDiv.appendChild(birdDiv);
            } else {
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIdx = e.dataTransfer.getData("text");
                    moveBird(parseInt(fromIdx), arrIdx);
                };
            }
            wrapper.appendChild(nestDiv);
        });
    }

    function handleMerge(from, to) {
        if (from === to) return;
        if (aktifYuvalar[from].birdLevel === aktifYuvalar[to].birdLevel && aktifYuvalar[from].birdLevel < 6) {
            aktifYuvalar[to].birdLevel++;
            aktifYuvalar[from].birdLevel = 0;
            gold += 50;
        } else if (aktifYuvalar[to].birdLevel === 0) {
            aktifYuvalar[to].birdLevel = aktifYuvalar[from].birdLevel;
            aktifYuvalar[from].birdLevel = 0;
        }
        render();
    }

    function moveBird(from, to) {
        aktifYuvalar[to].birdLevel = aktifYuvalar[from].birdLevel;
        aktifYuvalar[from].birdLevel = 0;
        render();
    }

    function updateTimer() {
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }

    function visitorArrival() {
        const v = document.getElementById('visitor');
        // İnternet ziyaretçi linki
        v.style.backgroundImage = `url('${URL_AYARLARI.ziyaretci}')`;
        v.style.left = "50%"; v.style.top = "100px";
        setTimeout(() => { gold += 150; v.style.top = "-100px"; }, 3000);
    }

    function buyNest() {
        if (gold >= 100 && aktifYuvalar.length < dalKoordinatlari.length) {
            gold -= 100;
            aktifYuvalar.push({ index: aktifYuvalar.length, birdLevel: 1 });
            render();
        }
    }

    init();
</script>
</body>
</html>
