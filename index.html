<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Foxzy AI v7.1 - Pro Version</title>
    <style>
        :root { --p: #e67e22; --bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        
        #sim-space { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); }

        /* Foxy Karakter Konteyner */
        #fox-core {
            position: absolute; width: 180px; height: 180px;
            cursor: grab; z-index: 10;
            transition: transform 0.1s linear;
            display: flex; align-items: center; justify-content: center;
        }
        #fox-core:active { cursor: grabbing; }

        /* Gerçek Tilki Resmi */
        #fox-core img {
            width: 100%; height: auto;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
        }

        /* Düşünce Balonu */
        #speech-bubble {
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 15px; border-radius: 15px;
            font-size: 13px; font-weight: bold; color: #1a1a1a;
            opacity: 0; transition: opacity 0.3s;
            white-space: nowrap; pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* HUD Paneli */
        #hud {
            position: fixed; top: 25px; left: 25px;
            background: rgba(0,0,0,0.7); padding: 20px;
            border-radius: 15px; border: 1px solid rgba(230, 126, 34, 0.4);
            color: white; backdrop-filter: blur(5px);
            width: 180px;
        }
        .stat-row { margin-bottom: 10px; font-size: 12px; font-weight: bold; }
        .bar { width: 100%; height: 8px; background: #2c3e50; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        .fill { height: 100%; background: var(--p); width: 100%; transition: width 0.4s; }
        .pro-btn {
            width: 100%; padding: 10px; margin-top: 15px; cursor: pointer;
            background: var(--p); border: none; color: white;
            border-radius: 8px; font-weight: bold; font-size: 11px; transition: 0.2s;
        }
        .pro-btn:hover { background: #d35400; transform: scale(1.03); }

        /* Yükleme Ekranı (Matrix) */
        #boot {
            position: fixed; inset: 0; background: black; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--p); font-family: monospace; transition: 0.8s;
        }
        .matrix-bar { width: 250px; height: 2px; background: #1a1a1a; margin-top: 10px; }
        #boot-fill { width: 0%; height: 100%; background: var(--p); transition: 0.1s linear; }
    </style>
</head>
<body>

<div id="boot">
    <div>CONNECTING_TO_FOX_CORE_PRO_v7.1...</div>
    <div class="matrix-bar"><div id="boot-fill"></div></div>
</div>

<div id="sim-space">
    <div id="fox-core">
        <div id="speech-bubble">Merhaba Ahmet! 🦊</div>
        <img id="fox-img" src="" draggable="false">
    </div>
</div>

<div id="hud">
    <div class="stat-row">ENERGY <div class="bar"><div id="e-fill" class="fill"></div></div></div>
    <div class="stat-row">HUNGER <div class="bar"><div id="h-fill" class="fill"></div></div></div>
    <button onclick="feedFoxy()" class="pro-btn">YEMEK VER (🍖)</button>
</div>

<script>
    const core = document.getElementById('fox-core');
    const img = document.getElementById('fox-img');
    const bubble = document.getElementById('speech-bubble');
    const eFill = document.getElementById('e-fill');
    const hFill = document.getElementById('h-fill');

    let stats = { energy: 100, hunger: 100 };
    let pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let target = { x: pos.x, y: pos.y };
    let isDragging = false;

    // GERÇEK, BOZULMAYAN TİLKİ LİNKLERİ (Doğrudan Resim Linkleri)
    const GIFS = {
        idle: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNmNudTFqcXUwdXp5bmZ1bmx0eWltYXU5eXoxbmV3YnhueGt6eGZlbXImZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/Ym7YvPVA9hH56/giphy.gif",
        run: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXByeXJueXByeXJueXByeXJueXByeXJueXByeXJueXByJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCBmcm9tX2dpZmZ5JmN0PWc/3o7TKSjRrfIPjeiVyM/giphy.gif",
        sleep: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHVpazZpZzh6czY1Z3FmaXN4YnFobG1reGd1eHgyaGxpa2Q1bmJ4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VvXg0VkS6A2I/giphy.gif"
    };

    // Yükleme Ekranı Kontrolü
    let loadProgress = 0;
    const bootTimer = setInterval(() => {
        loadProgress += Math.random() * 15;
        if (loadProgress >= 100) {
            loadProgress = 100;
            clearInterval(bootTimer);
            document.getElementById('boot').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('boot').remove();
                startFoxzyAI();
                startFoxzyPhysics();
                say("Sistem Aktif! 🦊");
            }, 800);
        }
        document.getElementById('boot-fill').style.width = loadProgress + "%";
    }, 100);

    // AI Motoru (Rastgele Karar)
    function startFoxzyAI() {
        setInterval(() => {
            if (isDragging || stats.energy <= 0) return;

            const decision = Math.random();
            if (decision > 0.6) {
                // Koş
                target.x = Math.random() * (window.innerWidth - 180);
                target.y = Math.random() * (window.innerHeight - 180);
                img.src = GIFS.run;
                say("Gözcü devriyesi! 🐾");
            } else {
                // Dur
                img.src = GIFS.idle;
            }

            // İstatistikleri Gerçekçi Düşür
            stats.energy = Math.max(0, stats.energy - 3);
            stats.hunger = Math.max(0, stats.hunger - 4);
            
            if (stats.energy <= 0) {
                img.src = GIFS.sleep;
                say("Çok yoruldum... Zzz 💤");
            }
            updateHUD();
        }, 4000);
    }

    // Fizik Motoru (Yumuşak Takip)
    function startFoxzyPhysics() {
        img.src = GIFS.idle; // Başlangıç resmi
        const move = () => {
            if (!isDragging && img.src !== GIFS.sleep) {
                // Hedefe yumuşak takip (Lerp)
                pos.x += (target.x - pos.x) * 0.04;
                pos.y += (target.y - pos.y) * 0.04;

                core.style.left = pos.x + "px";
                core.style.top = pos.y + "px";

                // Yön Kontrolü
                const diff = target.x - pos.x;
                if (Math.abs(diff) > 2) {
                    core.style.transform = `scaleX(${diff > 0 ? 1 : -1})`;
                }
            }
            requestAnimationFrame(move);
        };
        move();
    }

    // Pet Sistemi
    function updateHUD() {
        eFill.style.width = stats.energy + "%";
        hFill.style.width = stats.hunger + "%";
    }

    function say(txt) {
        bubble.innerText = txt;
        bubble.style.opacity = "1";
        setTimeout(() => { if (!isDragging && img.src !== GIFS.sleep) bubble.style.opacity = "0"; }, 3000);
    }

    function feedFoxy() {
        stats.hunger = 100;
        stats.energy = Math.min(100, stats.energy + 20);
        say("Harika kemik! Teşekkürler Ahmet 🍖");
        if(img.src === GIFS.sleep) img.src = GIFS.idle;
        updateHUD();
    }

    // Sürükleme (Vivi Kedi Modu)
    core.onmousedown = (e) => {
        isDragging = true;
        const shiftX = e.clientX - core.offsetLeft;
        const shiftY = e.clientY - core.offsetTop;
        img.src = GIFS.idle; // Taşırken idle resmine geç
        say("Hooop! Nereye?");

        document.onmousemove = (moveE) => {
            pos.x = moveE.pageX - shiftX;
            pos.y = moveE.pageY - shiftY;
            
            // Ekran Sınırları
            pos.x = Math.max(0, Math.min(pos.x, window.innerWidth - 180));
            pos.y = Math.max(0, Math.min(pos.y, window.innerHeight - 180));
            
            core.style.left = pos.x + "px";
            core.style.top = pos.y + "px";
        };

        document.onmouseup = () => {
            document.onmousemove = null;
            isDragging = false;
            target.x = pos.x;
            target.y = pos.y;
            say("Burası iyiymiş. ✋");
            document.onmouseup = null;
        };
    };

</script>

</body>
</html>
