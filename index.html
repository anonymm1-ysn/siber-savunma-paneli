<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Benim Oyunum</title>
    <style>
        /* CSS OLMADAN RESİMLER DÜZGÜN DURMAZ, BU KISIM ŞART */
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; }

        /* ARKA PLAN AYARI */
        #game-world {
            width: 100vw;
            height: 100vh;
            background-image: url('arkaplan.jpg'); /* ARKA PLAN BURAYA */
            background-size: cover;
            background-position: bottom;
            position: relative;
        }

        /* KARAKTER AYARI */
        #character {
            width: 100px; /* Karakterin genişliği */
            height: 100px; /* Karakterin boyu */
            background-image: url('karakter1.png'); /* KARAKTER BURAYA */
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 50px; /* Çimene basma seviyesi */
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s ease, transform 0.1s ease;
        }

        /* ENVANTER (MINECRAFT STİLİ) */
        #inventory-ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #c6c6c6; border: 4px solid #373737; padding: 10px;
            display: none; z-index: 100;
        }
        .slot-grid { display: grid; grid-template-columns: repeat(9, 40px); gap: 5px; }
        .slot { width: 40px; height: 40px; background: #8b8b8b; border: 2px solid #373737; }
    </style>
</head>
<body>

    <div id="game-world">
        <div id="character"></div>
        <div id="inventory-ui">
            <div class="slot-grid" id="slot-container"></div>
        </div>
    </div>

    <!-- SESLER -->
    <audio id="beep" src="beepbeepsound.mp3"></audio>
    <audio id="music" src="assumptions.mp3"></audio>

    <script>
        const char = document.getElementById('character');
        const inv = document.getElementById('inventory-ui');
        const beep = document.getElementById('beep');
        const music = document.getElementById('music');
        const slots = document.getElementById('slot-container');

        // 27 Tane slot oluştur
        for(let i=0; i<27; i++) {
            let s = document.createElement('div');
            s.className = 'slot';
            slots.appendChild(s);
        }

        let isJumping = false;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // YÖNLER (A ve D)
            if (key === 'a') char.style.transform = 'translateX(-50%) scaleX(-1)';
            if (key === 'd') char.style.transform = 'translateX(-50%) scaleX(1)';

            // ENVANTER (E)
            if (key === 'e') {
                if (inv.style.display === 'block') {
                    inv.style.display = 'none';
                } else {
                    inv.style.display = 'block';
                    beep.currentTime = 0;
                    beep.play();
                }
            }

            // ZIPLAMA (Space)
            if (e.code === 'Space' && !isJumping) {
                isJumping = true;
                music.currentTime = 0;
                music.play();

                char.style.bottom = '200px'; // Zıpla
                setTimeout(() => {
                    char.style.bottom = '50px'; // Düş
                    setTimeout(() => { isJumping = false; }, 300);
                }, 300);
            }
        });
    </script>
</body>
</html>
