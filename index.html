<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxzy AI Pro - Cloud Edition</title>
    <!-- CSS Dosyasını Bağlıyoruz -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Matrix Yükleme Ekranı -->
    <div id="loader">
        <div class="matrix-text">CONNECTING_TO_FOX_CLOUD...</div>
        <div class="load-track">
            <div id="load-bar"></div>
        </div>
    </div>

    <!-- Simülasyon Sahnesi -->
    <div id="stage">
        <div id="fox">
            <div id="bubble">Merhaba Ahmet!</div>
            <!-- Başlangıç resmi (Idle) -->
            <img id="fox-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNmNudTFqcXUwdXp5bmZ1bmx0eWltYXU5eXoxbmV3YnhueGt6eGZlbXImZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/Ym7YvPVA9hH56/giphy.gif" draggable="false">
        </div>
    </div>

    <!-- HUD (Bilgi Paneli) -->
    <div id="hud">
        <div class="stat-row">
            <span>ENERGY</span>
            <div class="bar"><div id="e-fill" class="fill"></div></div>
        </div>
        <div class="stat-row">
            <span>HUNGER</span>
            <div class="bar"><div id="h-fill" class="fill"></div></div>
        </div>
        <button id="feed-btn" onclick="feed()">YEMEK VER (🍖)</button>
    </div>

    <!-- JS Dosyasını Bağlıyoruz -->
    <script src="script.js"></script>
</body>
</html>
