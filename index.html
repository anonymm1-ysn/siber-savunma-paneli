<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuş Birleştirme - Beta 0.1.1</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* MANZARA ARKA PLANI (Kodla Yapıldı) */
        #game-canvas {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #4db6ac 0%, #80cbc4 40%, #cddc39 100%);
            position: relative;
        }

        /* ÜST PANEL */
        .ui { position: absolute; color: white; text-shadow: 2px 2px 4px #000; z-index: 100; font-weight: bold; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; margin: 15px; }
        #gold-ui { top: 10px; left: 10px; font-size: 26px; color: #ffd700; }
        #timer-ui { top: 10px; right: 10px; text-align: right; font-size: 18px; }

        /* YUVALAR */
        .nest {
            width: 110px;
            height: 65px;
            position: absolute;
            background: #8d6e63; /* Yuva kahverengisi */
            border-radius: 50% 50% 30% 30%;
            border-bottom: 6px solid #4e342e;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* KUŞLAR (EMOJİ - ASLA KIRILMAZ) */
        .bird {
            font-size: 55px;
            cursor: grab;
            user-select: none;
            transition: transform 0.15s;
            margin-top: -35px; /* Yuvanın içinde/üstünde dursun */
        }
        .bird:active { cursor: grabbing; transform: scale(1.3); }

        /* ZİYARETÇİ KUŞ */
        #visitor {
            position: absolute;
            top: -100px;
            font-size: 65px;
            transition: all 2.5s ease-in-out;
            z-index: 80;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.3));
        }

        /* SATIN ALMA BUTONU */
        #buy-nest-btn {
            bottom: 30px;
            right: 30px;
            padding: 18px 28px;
            background: #4caf50;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32;
            position: absolute;
            transition: 0.1s;
        }
        #buy-nest-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2e7d32; }
        #buy-nest-btn:disabled { background: #9e9e9e; box-shadow: 0 6px 0 #757575; cursor: not-allowed; }

    </style>
</head>
<body>

<div id="game-canvas">
    <div id="gold-ui" class="ui">Altın: <span id="gold">120</span> 💰</div>
    <div id="timer-ui" class="ui">Ziyaretçi Geliyor: <span id="timer">04:00</span> 🦅</div>
    
    <div id="visitor">🦅</div>

    <div id="nests-wrapper">
        </div>

    <button id="buy-nest-btn">Yeni Yuva Al (100 Altın)</button>
</div>

<script>
    let gold = 120;
    let timerSeconds = 240; // 4 Dakika
    let nests = [
        { id: 0, x: 25, y: 50, birdLevel: 1 }, // Başlangıç kuşu
        { id: 1, x: 55, y: 40, birdLevel: 0 },
        { id: 2, x: 70, y: 60, birdLevel: 0 }
    ];

    const birdIcons = {
        1: "🐤", // Seviye 1
        2: "🦜", // Seviye 2
        3: "🦚", // Seviye 3
        4: "🦉", // Seviye 4
        5: "🦢"  // Seviye 5
    };

    function init() {
        drawNests();
        startTimer();
        document.getElementById('buy-nest-btn').onclick = buyNest;
    }

    function drawNests() {
        const wrapper = document.getElementById('nests-wrapper');
        wrapper.innerHTML = '';
        nests.forEach((nest, index) => {
            const nestDiv = document.createElement('div');
            nestDiv.className = 'nest';
            nestDiv.style.left = nest.x + '%';
            nestDiv.style.top = nest.y + '%';

            if (nest.birdLevel > 0) {
                const birdDiv = document.createElement('div');
                birdDiv.className = 'bird';
                birdDiv.innerText = birdIcons[nest.birdLevel];
                birdDiv.draggable = true;
                
                birdDiv.ondragstart = (e) => e.dataTransfer.setData("text", index);
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIndex = e.dataTransfer.getData("text");
                    handleMerge(parseInt(fromIndex), index);
                };

                nestDiv.appendChild(birdDiv);
            } else {
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIndex = e.dataTransfer.getData("text");
                    moveBird(parseInt(fromIndex), index);
                };
            }
            wrapper.appendChild(nestDiv);
        });
        document.getElementById('gold').innerText = gold;
        document.getElementById('buy-nest-btn').disabled = (gold < 100);
    }

    function handleMerge(fromIdx, toIdx) {
        if (fromIdx === toIdx) return;
        
        let fromNest = nests[fromIdx];
        let toNest = nests[toIdx];

        if (fromNest.birdLevel === toNest.birdLevel && fromNest.birdLevel < 5) {
            nests[toIdx].birdLevel += 1;
            nests[fromIdx].birdLevel = 0;
            gold += 25; // Birleştirme ödülü
        } else if (toNest.birdLevel === 0) {
            moveBird(fromIdx, toIdx);
        }
        drawNests();
    }

    function moveBird(fromIdx, toIdx) {
        nests[toIdx].birdLevel = nests[fromIdx].birdLevel;
        nests[fromIdx].birdLevel = 0;
        drawNests();
    }

    function startTimer() {
        setInterval(() => {
            timerSeconds--;
            if (timerSeconds <= 0) {
                visitorArrival();
                timerSeconds = 240;
            }
            updateTimerDisplay();
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        document.getElementById('timer').innerText = 
            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function visitorArrival() {
        const v = document.getElementById('visitor');
        v.style.left = "48%";
        v.style.top = "120px";

        setTimeout(() => {
            gold += 50; // Ziyaretçi hediyesi
            v.style.top = "-100px";
            drawNests();
        }, 3500);
    }

    function buyNest() {
        if (gold >= 100) {
            gold -= 100;
            // Yeni yuvayı rastgele ama ekrana sığacak bir yere koy
            const newX = 15 + Math.random() * 70;
            const newY = 30 + Math.random() * 40;
            nests.push({ id: nests.length, x: newX, y: newY, birdLevel: 1 });
            drawNests();
        }
    }

    init();
</script>

</body>
</html>
