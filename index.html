<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Foxzy - v7.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="matrix-text">FOX_CORE_v7.0_INITIALIZING...</div>
            <div class="progress-bar"><div id="load-fill"></div></div>
        </div>
    </div>

    <div id="stage">
        <div id="foxy">
            <div id="thought">Merhaba! 🦊</div>
            <img id="foxy-img" src="" draggable="false">
        </div>
    </div>

    <div id="hud">
        <div class="stat-row">
            <span>HUNGER</span>
            <div class="bar"><div id="hunger-bar" class="fill"></div></div>
        </div>
        <div class="stat-row">
            <span>ENERGY</span>
            <div class="bar"><div id="energy-bar" class="fill"></div></div>
        </div>
        <button onclick="petFoxy.feedFoxy()" class="pro-btn">YEMEK VER (🍖)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
