<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kuş Birleştirme - Beta 0.1.9 (Kesin Çözüm)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* ARKA PLAN */
        #game-canvas {
            width: 100vw;
            height: 100vh;
            background: url('file:///c:/Users/Administrator/Downloads/Adsız tasarım.png') no-repeat center center;
            background-size: cover;
            position: relative;
            background-color: #e8f5e9; 
        }

        /* UI TASARIMI */
        .ui { position: absolute; color: #2e7d32; font-weight: bold; padding: 12px 20px; background: rgba(255,255,255,0.85); border-radius: 20px; margin: 15px; z-index: 100; border: 2px solid #81c784; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #gold-ui { top: 0; left: 0; font-size: 24px; }
        #timer-ui { top: 0; right: 0; font-size: 16px; }

        /* YUVALAR */
        .nest {
            width: 110px;
            height: 80px;
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.2s;
        }

        /* KUŞLAR (ŞEFFAFLIK GARANTİLİ) */
        .bird {
            width: 70px;
            height: 70px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: grab;
            margin-top: -35px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }
        .bird:active { cursor: grabbing; transform: scale(1.2); }

        /* ZİYARETÇİ */
        #visitor {
            position: absolute;
            top: -150px;
            width: 100px;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            transition: all 3s ease-in-out;
            z-index: 90;
        }

        /* SATIN ALMA BUTONU */
        #buy-nest-btn {
            bottom: 30px;
            right: 30px;
            padding: 15px 35px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            position: absolute;
            z-index: 100;
            box-shadow: 0 6px 0 #e65100;
            transition: 0.1s;
        }
        #buy-nest-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e65100; }
        #buy-nest-btn:disabled { background: #bdbdbd; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="gold-ui" class="ui">Altın: <span id="gold">120</span> 💰</div>
    <div id="timer-ui" class="ui">Hediye Kuş: <span id="timer">04:00</span> 🦅</div>
    
    <div id="visitor"></div>
    <div id="nests-wrapper"></div>

    <button id="buy-nest-btn">Yeni Yuva Al (100 Altın)</button>
</div>

<script>
    // GÜVENİLİR VE ENGEL OLMAYAN YENİ LİNKLER
    const ASSETS = {
        yuva: "https://cdn-icons-png.flaticon.com/512/3523/3523063.png",
        ziyaretci: "https://cdn-icons-png.flaticon.com/512/25/25661.png",
        kuslar: {
            1: "https://cdn-icons-png.flaticon.com/512/2589/2589050.png", // Yeşil Kuş
            2: "https://cdn-icons-png.flaticon.com/512/2589/2589139.png", // Sarı Kuş
            3: "https://cdn-icons-png.flaticon.com/512/2589/2589110.png", // Mavi Kuş
            4: "https://cdn-icons-png.flaticon.com/512/2589/2589114.png", // Kırmızı Kuş
            5: "https://cdn-icons-png.flaticon.com/512/2589/2589121.png", // Tukan
            6: "https://cdn-icons-png.flaticon.com/512/2589/2589101.png"  // Büyük Papağan
        }
    };

    // Senin Canva'daki ağaç dallarına tam oturan koordinatlar
    const dallar = [
        { x: 41, y: 45 }, { x: 35, y: 32 }, { x: 56, y: 36 }, 
        { x: 62, y: 25 }, { x: 44, y: 20 }, { x: 50, y: 55 }
    ];

    let gold = 120;
    let timerSeconds = 240;
    let aktifYuvalar = [{ dIndex: 0, level: 1 }, { dIndex: 1, level: 0 }];

    function init() {
        render();
        // Saniyede 1 Altın ve Sistem Döngüsü
        setInterval(() => {
            gold += 1;
            document.getElementById('gold').innerText = gold;
            timerSeconds--;
            if (timerSeconds <= 0) { visitorArrival(); timerSeconds = 240; }
            updateTimer();
        }, 1000);
        document.getElementById('buy-nest-btn').onclick = buyNest;
    }

    function render() {
        const wrapper = document.getElementById('nests-wrapper');
        wrapper.innerHTML = '';
        
        aktifYuvalar.forEach((yuva, arrIdx) => {
            const pos = dallar[yuva.dIndex];
            const nDiv = document.createElement('div');
            nDiv.className = 'nest';
            nDiv.style.left = pos.x + '%';
            nDiv.style.top = pos.y + '%';
            nDiv.style.backgroundImage = `url('${ASSETS.yuva}')`;

            if (yuva.level > 0) {
                const bDiv = document.createElement('div');
                bDiv.className = 'bird';
                bDiv.style.backgroundImage = `url('${ASSETS.kuslar[yuva.level]}')`;
                bDiv.draggable = true;
                bDiv.ondragstart = (e) => e.dataTransfer.setData("text", arrIdx);
                nDiv.ondragover = (e) => e.preventDefault();
                nDiv.ondrop = (e) => merge(parseInt(e.dataTransfer.getData("text")), arrIdx);
                nDiv.appendChild(bDiv);
            } else {
                nDiv.ondragover = (e) => e.preventDefault();
                nDiv.ondrop = (e) => move(parseInt(e.dataTransfer.getData("text")), arrIdx);
            }
            wrapper.appendChild(nDiv);
        });
        
        const btn = document.getElementById('buy-nest-btn');
        btn.disabled = (gold < 100 || aktifYuvalar.length >= dallar.length);
    }

    function merge(from, to) {
        if (from === to) return;
        if (aktifYuvalar[from].level === aktifYuvalar[to].level && aktifYuvalar[from].level < 6) {
            aktifYuvalar[to].level++;
            aktifYuvalar[from].level = 0;
            gold += 40;
        } else if (aktifYuvalar[to].level === 0) {
            move(from, to);
        }
        render();
    }

    function move(from, to) {
        aktifYuvalar[to].level = aktifYuvalar[from].level;
        aktifYuvalar[from].level = 0;
        render();
    }

    function updateTimer() {
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }

    function visitorArrival() {
        const v = document.getElementById('visitor');
        v.style.backgroundImage = `url('${ASSETS.ziyaretci}')`;
        v.style.left = "48%"; v.style.top = "80px";
        setTimeout(() => { 
            gold += 200; 
            v.style.top = "-150px"; 
            document.getElementById('gold').innerText = gold;
        }, 3000);
    }

    function buyNest() {
        if (gold >= 100 && aktifYuvalar.length < dallar.length) {
            gold -= 100;
            aktifYuvalar.push({ dIndex: aktifYuvalar.length, level: 1 });
            render();
        }
    }

    init();
</script>
</body>
</html>
