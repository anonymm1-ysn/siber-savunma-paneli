<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VAULT OS v24.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div id="login-screen">
        <div class="login-container">
            <h1>HOŞ GELDİNİZ</h1>
            <input type="text" id="user-name-input" placeholder="Adınızı girin..." autocomplete="off">
            <button class="main-login-btn" onclick="saveUser()">BAŞLA</button>
            <div class="credits" onclick="alert('Yapımcı: AHMETYSS')">Kim tarafından yapıldı?</div>
        </div>
    </div>

   
    <div id="prep-area">
        <div class="knight-visual">⚔️</div>
        <div class="prep-controls">
            <h2 style="color:white">Sistem Hazır, <span id="user-display"></span></h2>
            <button class="blue-start-btn" onclick="bootVM()">TERMINALE BAŞLA</button>
            <button class="leader-btn" onclick="toggleLeaders()">LEADERBOARD</button>
        </div>

        <div id="leaderboard-win" style="display:none;">
            <h3>🏆 SIRALAMA</h3>
            <ul id="leader-list" style="list-style:none; padding:0;"></ul>
            <button onclick="toggleLeaders()" style="width:100%">KAPAT</button>
        </div>
    </div>


    <div id="vm-fullscreen">
        <div id="terminal-area">
            <div style="color:#00adef; margin-bottom:10px;">WINDOWS 8 PRO - VIRTUAL KERNEL v3.0</div>
            <div id="log-box" class="term-content"></div>
            <div style="display:flex">
                <span id="term-tag" style="color:#0f0"></span>
                <input type="text" id="cmd-input">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
