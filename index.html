<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxy - Sanal Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="foxy-container">
        <div id="speech-bubble">Merhaba Ahmet!</div>
        <img id="foxy-img" src="foxy.png" alt="Foxy" draggable="false">
    </div>

    <div class="control-panel">
        <div class="stats">
            <div class="stat-item">Açlık: <span id="hunger-val">100</span>%</div>
            <div class="stat-item">Susuzluk: <span id="thirst-val">100</span>%</div>
            <div class="stat-item">Enerji: <span id="energy-val">100</span>%</div>
            <div class="stat-item">Temizlik: <span id="clean-val">100</span>%</div>
        </div>
        <div class="actions">
            <button onclick="feedFoxy()">🍖 Yemek Ver</button>
            <button onclick="waterFoxy()">💧 Su Ver</button>
            <button onclick="petFoxy()">✋ Sev</button>
            <button onclick="washFoxy()">🧽 Yıka</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
