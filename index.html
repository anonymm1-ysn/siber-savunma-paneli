<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kuş Birleştirme - Beta 0.0.0.1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; }
        #game-container { width: 400px; height: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; overflow: hidden; border: 4px solid #4fc3f7; margin-top: 20px; }
        #egg-button { background: #ffccbc; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 20px; }
        #egg-button:hover { background: #ffab91; transform: scale(1.05); }
        .bird { width: 60px; height: 60px; position: absolute; cursor: grab; display: flex; align-items: center; justify-content: center; font-size: 30px; user-select: none; transition: transform 0.1s; }
        .stats { margin-top: 10px; font-size: 18px; color: #0277bd; }
    </style>
</head>
<body>

    <h1>Kuş Birleştirme (Beta 0.0.0.1)</h1>
    <div class="stats">Toplanan Yumurta: <span id="egg-count">0</span></div>
    
    <div id="game-container">
        </div>

    <button id="egg-button">Ziyaretçi Kuşun Yumurtasını Topla!</button>

    <script>
        const container = document.getElementById('game-container');
        const eggCountSpan = document.getElementById('egg-count');
        const eggButton = document.getElementById('egg-button');

        let eggs = 0;
        let birds = [];
        
        // Kuş Türleri (Level'a göre emojiler veya görseller)
        const birdTypes = {
            1: { name: "Muhabbet Kuşu", icon: "🦜" },
            2: { name: "Sultan Papağanı", icon: "🐤" },
            3: { name: "Cennet Papağanı", icon: "🐦" },
            4: { name: "Kakadu", icon: "🕊️" },
            5: { name: "Anka", icon: "🔥" }
        };

        eggButton.onclick = () => {
            eggs++;
            eggCountSpan.innerText = eggs;
            createBird(1); // İlk seviye kuş oluştur
        };

        function createBird(level) {
            const bird = document.createElement('div');
            bird.className = 'bird';
            bird.innerText = birdTypes[level].icon;
            bird.dataset.level = level;
            
            // Rastgele pozisyon
            bird.style.left = Math.random() * (container.clientWidth - 60) + 'px';
            bird.style.top = Math.random() * (container.clientHeight - 60) + 'px';

            makeDraggable(bird);
            container.appendChild(bird);
            birds.push(bird);
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                checkMerge(el);
            }
        }

        function checkMerge(draggedBird) {
            birds.forEach(targetBird => {
                if (draggedBird !== targetBird && isOverlapping(draggedBird, targetBird)) {
                    if (draggedBird.dataset.level === targetBird.dataset.level) {
                        let nextLevel = parseInt(draggedBird.dataset.level) + 1;
                        if (birdTypes[nextLevel]) {
                            // Birleşme gerçekleşiyor
                            container.removeChild(draggedBird);
                            container.removeChild(targetBird);
                            birds = birds.filter(b => b !== draggedBird && b !== targetBird);
                            createBird(nextLevel);
                        }
                    }
                }
            });
        }

        function isOverlapping(el1, el2) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            return !(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom);
        }
    </script>
</body>
</html>
