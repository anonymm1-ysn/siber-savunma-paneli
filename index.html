<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuş Birleştirme - Beta 0.1.2</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* ARKA PLAN */
        #game-canvas {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #4db6ac 0%, #80cbc4 40%, #cddc39 100%);
            position: relative;
        }

        /* AĞAÇ GÖVDESİ VE DALLAR */
        .tree-trunk {
            position: absolute;
            left: -50px;
            bottom: 0;
            width: 120px;
            height: 80%;
            background: #5d4037;
            border-radius: 0 50px 0 0;
            z-index: 1;
        }

        .branch {
            position: absolute;
            background: #5d4037;
            height: 15px;
            border-radius: 10px;
            z-index: 1;
            transform-origin: left center;
        }

        /* ÜST PANEL */
        .ui { position: absolute; color: white; text-shadow: 2px 2px 4px #000; z-index: 100; font-weight: bold; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; margin: 15px; }
        #gold-ui { top: 10px; left: 10px; font-size: 26px; color: #ffd700; }
        #timer-ui { top: 10px; right: 10px; text-align: right; font-size: 18px; }

        /* YUVALAR */
        .nest {
            width: 100px;
            height: 50px;
            position: absolute;
            background: #8d6e63;
            border-radius: 50% 50% 30% 30%;
            border-bottom: 6px solid #4e342e;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        /* KUŞLAR */
        .bird {
            font-size: 50px;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s;
            margin-top: -30px;
        }
        .bird:active { cursor: grabbing; transform: scale(1.3); }

        /* ZİYARETÇİ */
        #visitor {
            position: absolute;
            top: -100px;
            font-size: 60px;
            transition: all 2.5s ease-in-out;
            z-index: 80;
        }

        /* BUTON */
        #buy-nest-btn {
            bottom: 30px;
            right: 30px;
            padding: 18px 28px;
            background: #4caf50;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32;
            position: absolute;
            z-index: 100;
        }
        #buy-nest-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2e7d32; }
    </style>
</head>
<body>

<div id="game-canvas">
    <div class="tree-trunk"></div>
    
    <div id="gold-ui" class="ui">Altın: <span id="gold">120</span> 💰</div>
    <div id="timer-ui" class="ui">Ziyaretçi: <span id="timer">04:00</span> 🦅</div>
    
    <div id="visitor">🦅</div>
    <div id="nests-wrapper"></div>

    <button id="buy-nest-btn">Yeni Yuva Al (100 Altın)</button>
</div>

<script>
    let gold = 120;
    let timerSeconds = 240;
    
    // Yuva ve Dal Pozisyonları
    let nests = [
        { id: 0, x: 20, y: 50, birdLevel: 1, branchWidth: 200, angle: 5 },
        { id: 1, x: 45, y: 35, birdLevel: 0, branchWidth: 450, angle: -2 },
        { id: 2, x: 65, y: 60, birdLevel: 0, branchWidth: 650, angle: 3 }
    ];

    const birdIcons = { 1: "🐤", 2: "🦜", 3: "🦚", 4: "🦉", 5: "🦢" };

    function init() {
        drawWorld();
        startSystems();
        document.getElementById('buy-nest-btn').onclick = buyNest;
    }

    function drawWorld() {
        const wrapper = document.getElementById('nests-wrapper');
        wrapper.innerHTML = '';
        
        nests.forEach((nest, index) => {
            // Dalı Çiz
            const branch = document.createElement('div');
            branch.className = 'branch';
            branch.style.width = nest.branchWidth + 'px';
            branch.style.left = '0px';
            branch.style.top = nest.y + 5 + '%';
            branch.style.transform = `rotate(${nest.angle}deg)`;
            wrapper.appendChild(branch);

            // Yuvayı Çiz
            const nestDiv = document.createElement('div');
            nestDiv.className = 'nest';
            nestDiv.style.left = nest.x + '%';
            nestDiv.style.top = nest.y + '%';

            if (nest.birdLevel > 0) {
                const birdDiv = document.createElement('div');
                birdDiv.className = 'bird';
                birdDiv.innerText = birdIcons[nest.birdLevel];
                birdDiv.draggable = true;
                birdDiv.ondragstart = (e) => e.dataTransfer.setData("text", index);
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIndex = e.dataTransfer.getData("text");
                    handleMerge(parseInt(fromIndex), index);
                };
                nestDiv.appendChild(birdDiv);
            } else {
                nestDiv.ondragover = (e) => e.preventDefault();
                nestDiv.ondrop = (e) => {
                    const fromIndex = e.dataTransfer.getData("text");
                    moveBird(parseInt(fromIndex), index);
                };
            }
            wrapper.appendChild(nestDiv);
        });
    }

    function startSystems() {
        // Her saniye 1 altın gelme ve zamanlayıcı sistemi
        setInterval(() => {
            gold += 1; // Saniyede 1 altın
            document.getElementById('gold').innerText = gold;
            
            timerSeconds--;
            if (timerSeconds <= 0) {
                visitorArrival();
                timerSeconds = 240;
            }
            updateTimerDisplay();
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function handleMerge(fromIdx, toIdx) {
        if (fromIdx === toIdx) return;
        if (nests[fromIdx].birdLevel === nests[toIdx].birdLevel && nests[fromIdx].birdLevel < 5) {
            nests[toIdx].birdLevel += 1;
            nests[fromIdx].birdLevel = 0;
            gold += 50; // Merge ödülü
        } else if (nests[toIdx].birdLevel === 0) {
            nests[toIdx].birdLevel = nests[fromIdx].birdLevel;
            nests[fromIdx].birdLevel = 0;
        }
        drawWorld();
    }

    function moveBird(fromIdx, toIdx) {
        nests[toIdx].birdLevel = nests[fromIdx].birdLevel;
        nests[fromIdx].birdLevel = 0;
        drawWorld();
    }

    function visitorArrival() {
        const v = document.getElementById('visitor');
        v.style.left = "50%";
        v.style.top = "150px";
        setTimeout(() => {
            gold += 100;
            v.style.top = "-100px";
        }, 3000);
    }

    function buyNest() {
        if (gold >= 100) {
            gold -= 100;
            const newY = 20 + Math.random() * 50;
            nests.push({ 
                id: nests.length, 
                x: 30 + Math.random() * 50, 
                y: newY, 
                birdLevel: 1, 
                branchWidth: 300 + Math.random() * 400,
                angle: (Math.random() - 0.5) * 10
            });
            drawWorld();
        }
    }

    init();
</script>
</body>
</html>
