<!DOCTYPE html>
<html>
<head>
    <title>Pixel Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0099ff; }
        canvas { display: block; }
    </style>
</head>
<body>

<audio id="gameMusic" loop>
    <source src="bensound-dance.mp3" type="audio/mpeg">
</audio>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const music = document.getElementById('gameMusic');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- GÖRSELLERİ YÜKLEME ---
const background = new Image();
background.src = 'New Piskel (2).png'; // Paylaştığın arka plan

const playerImg = new Image();
// Egemen karakteri atınca buradaki 'karakter.png' kısmını onun dosya adıyla değiştir
playerImg.src = 'bear.png'; 

// --- DEĞİŞKENLER ---
let cameraX = 0;
let player = {
    x: 100,
    y: 0, // Kod içinde çimenlerin üzerine ayarlanacak
    width: 64,
    height: 64,
    speed: 5
};

let keys = {};

// Müzik başlatma (Tarayıcılar kullanıcı tıklamadan ses çalmaz)
window.addEventListener('keydown', () => {
    music.play().catch(e => console.log("Müzik henüz hazır değil"));
}, { once: true });

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    // Yürüme mantığı
    if (keys['KeyD'] || keys['ArrowRight']) {
        player.x += player.speed;
        cameraX += player.speed; // Kamera karakterle gider
    }
    if (keys['KeyA'] || keys['ArrowLeft']) {
        player.x -= player.speed;
        cameraX -= player.speed;
    }

    // Karakterin duracağı zemin yüksekliği (Çimenlerin üstü)
    // Çizimindeki kahverengi toprağın hemen üstü
    player.y = canvas.height - 210; 
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Arka planı çizmeye çalış
    try {
        let bgScroll = (cameraX * 0.2) % canvas.width;
        ctx.drawImage(background, -bgScroll, 0, canvas.width, canvas.height);
        ctx.drawImage(background, canvas.width - bgScroll, 0, canvas.width, canvas.height);
    } catch (e) {
        // Eğer görsel yüklenmezse hata vermemesi için burayı boş bırakıyoruz
    }

    // Zemin Testi (Görsel yoksa nerede yürüdüğünü görebilmen için)
    ctx.fillStyle = "#4a2b10"; // Toprak rengi
    ctx.fillRect(0, canvas.height - 150, canvas.width, 150);

    // Karakter (Egemen karakteri atana kadar geçici bir kare)
    if (playerImg.complete && playerImg.src.includes('.png')) {
        ctx.drawImage(playerImg, player.x - cameraX + 100, player.y, player.width, player.height);
    } else {
        ctx.fillStyle = "red"; // Karakter yerine kırmızı kare
        ctx.fillRect(player.x - cameraX + 100, player.y, player.width, player.height);
    }

}

function gameLoop() {
    update();
    draw();
}

// Görsel yüklendiğinde başlat
background.onload = () => {
    gameLoop();
};
</script>
</body>
</html>
